<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon UI</title>

    <link rel="stylesheet" href="style.css">

    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
    rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="circle1"></div>
    <div class="circle2"></div>

   

    <header class="header">

        <button class="menu-btn">
            <i class="ri-menu-line"></i>
        </button>

        <div class="logo">
            <img src="https://raw.githubusercontent.com/PokeAPI/media/master/logo/pokeapi_256.png" alt="">
            <h2>Pokédex</h2>
        </div>

        <button class="theme-btn">
            <i class="ri-moon-line"></i>
        </button>

    </header>

   

    <section class="search-section">

        <div class="search-box">

            <i class="ri-search-line search-icon"></i>

            <input
                type="text"
                placeholder="Search your favourite Pokémon">

        </div>

        <div class="filters">

            <button>
                Filter
                <i class="ri-arrow-down-s-line"></i>
            </button>

            <button>
                Sort
                <i class="ri-arrow-up-down-line"></i>
            </button>

        </div>

    </section>


    <section class="cards">

    
        <div class="card">

            <div class="card-top">

                <span class="pokemon-id">#0908</span>

                <button class="favorite-btn">
                    <i class="ri-heart-line"></i>
                </button>

            </div>

            <div class="card-image">

                <div class="background-circle"></div>

                <img
                src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/908.png"
                class="pokemon-image">

            </div>

            <h2 class="pokemon-name">Meowscarada</h2>

            <div class="card-bottom">

                <div class="type-badges">

                    <span class="type grass">Grass</span>

                </div>

                <button class="arrow-btn">
                    <i class="ri-arrow-right-line"></i>
                </button>

            </div>

        </div>

        

        <div class="card">

            <div class="card-top">

                <span class="pokemon-id">#0624</span>

                <button class="favorite-btn">
                    <i class="ri-heart-line"></i>
                </button>

            </div>

            <div class="card-image">

                <div class="background-circle"></div>

                <img
                src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/624.png"
                class="pokemon-image">

            </div>

            <h2 class="pokemon-name">Pawniard</h2>

            <div class="card-bottom">

                <div class="type-badges">

                    <span class="type dark">Dark</span>

                    <span class="type steel">Steel</span>

                </div>

                <button class="arrow-btn">
                    <i class="ri-arrow-right-line"></i>
                </button>

            </div>

        </div>


        <div class="card">

            <div class="card-top">

                <span class="pokemon-id">#0229</span>

                <button class="favorite-btn">
                    <i class="ri-heart-line"></i>
                </button>

            </div>

            <div class="card-image">

                <div class="background-circle"></div>

                <img
                src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/229.png"
                class="pokemon-image">

            </div>

            <h2 class="pokemon-name">Houndoom</h2>

            <div class="card-bottom">

                <div class="type-badges">

                    <span class="type dark">Dark</span>

                    <span class="type fire">Fire</span>

                </div>

                <button class="arrow-btn">
                    <i class="ri-arrow-right-line"></i>
                </button>

            </div>

        </div>

        

        <div class="card">

            <div class="card-top">

                <span class="pokemon-id">#0686</span>

                <button class="favorite-btn">
                    <i class="ri-heart-line"></i>
                </button>

            </div>

            <div class="card-image">

                <div class="background-circle"></div>

                <img
                src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/686.png"
                class="pokemon-image">

            </div>

            <h2 class="pokemon-name">Inkay</h2>

            <div class="card-bottom">

                <div class="type-badges">

                    <span class="type dark">Dark</span>

                    <span class="type psychic">Psychic</span>

                </div>

                <button class="arrow-btn">
                    <i class="ri-arrow-right-line"></i>
                </button>

            </div>

        </div>

    </section>

</div>
