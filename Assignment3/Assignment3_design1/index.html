<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Explore Artwork</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <section class="gallery">

        
        <div class="heading">
            <h2>Explore Art Work</h2>
            <a href="#">See All</a>
        </div>

       
        <div class="cards">

            <div class="card">
                <img src="monocular.jpeg" alt="Monocular">

                <div class="info">
                    <span>Monocular</span>
                    <span>54.8k <i class="fa-regular fa-heart"></i></span>
                </div>

                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="hornsmask.jpeg" alt="Horns Mask">

                <div class="info">
                    <span>Horns Mask</span>
                    <span>32.4k <i class="fa-regular fa-heart"></i></span>
                </div>

                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="lightmoon.jpeg" alt="Light Moon">

                <div class="info">
                    <span>Light Moon</span>
                    <span>86.8k <i class="fa-regular fa-heart"></i></span>
                </div>

                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="skullwire.jpeg" alt="skull wire">

                <div class="info">
                    <span>Skull wire</span>
                    <span>78.9k <i class="fa-regular fa-heart"></i></span>
                </div>

                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="realspoiderman.jpeg" alt="Spiderman">

                <div class="info">
                    <span>Spiderman</span>
                    <span>24.8k <i class="fa-regular fa-heart"></i></span>
                </div>

                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="spoiderman.jpeg" alt="Dead Pool">

                <div class="info">
                    <span>DeadPool</span>
                    <span>59.7k <i class="fa-regular fa-heart"></i></span>
                </div>

                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="whiteeye.jpeg" alt="white eye">

                <div class="info">
                    <span>White Eye</span>
                    <span>45.7k <i class="fa-regular fa-heart"></i></span>
                </div>

                <button>Place Bid</button>
            </div>

            <div class="card">
                <img src="plasticspinal.jpeg" alt="palstic spinal">

                <div class="info">
                    <span>Plastic Spinal</span>
                    <span>98.6k <i class="fa-regular fa-heart"></i></span>
                </div>

                <button>Place Bid</button>
            </div>

        </div>

    </section>

</body>
</html>
