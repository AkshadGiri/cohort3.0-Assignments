<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  </head>
  <body>
    <h1 class="bg-text">GAME</h1>
    <h1 class="bg-squid">SQUID</h1>
    <nav>
      <div class="logo">
        <img src="s6.jpeg" alt="Squid Game Logo" />
      </div>

      <ul>
        <li><a href="#">About</a></li>
        <li><a href="#" class="active">Watch Now</a></li>
        <li><a href="#">Actors</a></li>
        <li><a href="#">Contact</a></li>
      </ul>

      <div class="menu">&#9776;</div>
    </nav>
    <section class="hero">
      <!-- Left Content -->

      <div class="left">
        <img src="s6.jpeg" alt="Squid Game" class="title" />

        <p>Action / Thriller / Drama Series directed by Dong-hyuk Hwang</p>

        <p>Season 1 : 9 Episodes</p>

        <div class="buttons">
          <button class="play-btn">▶ Play Now</button>

          <button class="trailer-btn">Watch Trailer</button>
        </div>
      </div>

      <div class="scroll-text">
        <p>SCROLL</p>
        <div class="line"></div>
      </div>

      <!-- Right Image -->

      <div class="right">
        <img src="s2.jpeg" alt="Guard" />
      </div>
    </section>

    <section class="videos">

    <div class="video-card">
        <img src="s2.jpeg" alt="Video 1">
        <div class="play-icon">
    <i class="fa-solid fa-play"></i>
</div>
    </div>

    <div class="video-card">
        <img src="s3.jpeg" alt="Video 2">
        <div class="play-icon">
    <i class="fa-solid fa-play"></i>
</div>
    </div>

    <div class="video-card">
        <img src="s4.jpeg" alt="Video 3">
        <div class="play-icon">
    <i class="fa-solid fa-play"></i>
</div>
    </div>

</section>

    <div class="social-icons">

    <a href="#"><i class="fa-brands fa-twitter"></i></a>

    <a href="#"><i class="fa-brands fa-instagram"></i></a>

    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>

</div>

</html>
